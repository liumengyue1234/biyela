server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pine_wilt_detection?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pinewilt.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: PineWiltDiseaseDetectionSystemSecretKey2024CTImage
  expiration: 86400000  # 24小时

# 文件上传路径
file:
  upload-path: ./uploads/
  image-path: ./uploads/images/
  result-path: ./uploads/results/
  report-path: ./uploads/reports/

# Python深度学习服务配置
python:
  service-url: http://localhost:5000
