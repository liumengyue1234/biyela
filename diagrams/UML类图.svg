<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="inherit" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font: 11px sans-serif; fill: var(--color-text-primary, #444441); }
      .ts { font: 10px sans-serif; fill: var(--color-text-secondary, #888780); }
      .th { font: 500 13px sans-serif; fill: var(--color-text-primary, #444441); }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="340" y="30" class="th" text-anchor="middle">系统UML类图</text>
  
  <!-- User Class -->
  <rect x="40" y="70" width="160" height="120" rx="8" fill="var(--color-background-primary)" stroke="#378ADD" stroke-width="1.5"/>
  <rect x="40" y="70" width="160" height="30" rx="8 8 0 0" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="120" y="88" class="th" text-anchor="middle" dominant-baseline="central" font-size="13">User</text>
  <line x1="40" y1="100" x2="200" y2="100" stroke="#378ADD" stroke-width="1.5"/>
  <text x="50" y="118" class="t" dominant-baseline="central" font-size="11">- id: Long</text>
  <text x="50" y="134" class="t" dominant-baseline="central" font-size="11">- username: String</text>
  <text x="50" y="150" class="t" dominant-baseline="central" font-size="11">- password: String</text>
  <text x="50" y="166" class="t" dominant-baseline="central" font-size="11">- role: String</text>
  <line x1="40" y1="178" x2="200" y2="178" stroke="#378ADD" stroke-width="1"/>
  <text x="50" y="196" class="t" dominant-baseline="central" font-size="11">+ getUsername()</text>
  
  <!-- CtImage Class -->
  <rect x="260" y="70" width="160" height="120" rx="8" fill="var(--color-background-primary)" stroke="#639922" stroke-width="1.5"/>
  <rect x="260" y="70" width="160" height="30" rx="8 8 0 0" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <text x="340" y="88" class="th" text-anchor="middle" dominant-baseline="central" font-size="13">CtImage</text>
  <line x1="260" y1="100" x2="420" y2="100" stroke="#639922" stroke-width="1.5"/>
  <text x="270" y="118" class="t" dominant-baseline="central" font-size="11">- id: Long</text>
  <text x="270" y="134" class="t" dominant-baseline="central" font-size="11">- fileName: String</text>
  <text x="270" y="150" class="t" dominant-baseline="central" font-size="11">- filePath: String</text>
  <text x="270" y="166" class="t" dominant-baseline="central" font-size="11">- userId: Long</text>
  
  <!-- DetectionRecord Class -->
  <rect x="480" y="70" width="160" height="120" rx="8" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="1.5"/>
  <rect x="480" y="70" width="160" height="30" rx="8 8 0 0" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="560" y="88" class="th" text-anchor="middle" dominant-baseline="central" font-size="13">DetectionRecord</text>
  <line x1="480" y1="100" x2="640" y2="100" stroke="#D85A30" stroke-width="1.5"/>
  <text x="490" y="118" class="t" dominant-baseline="central" font-size="11">- id: Long</text>
  <text x="490" y="134" class="t" dominant-baseline="central" font-size="11">- imageId: Long</text>
  <text x="490" y="150" class="t" dominant-baseline="central" font-size="11">- modelType: String</text>
  <text x="490" y="166" class="t" dominant-baseline="central" font-size="11">- result: String</text>
  
  <!-- UserService Interface -->
  <rect x="40" y="250" width="160" height="100" rx="8" fill="var(--color-background-secondary)" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5,5"/>
  <rect x="40" y="250" width="160" height="30" rx="8 8 0 0" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="120" y="268" class="th" text-anchor="middle" dominant-baseline="central" font-size="13">UserService</text>
  <line x1="40" y1="280" x2="200" y2="280" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="50" y="298" class="t" dominant-baseline="central" font-size="11">+ login(username)</text>
  <text x="50" y="314" class="t" dominant-baseline="central" font-size="11">+ register(user)</text>
  <text x="50" y="330" class="t" dominant-baseline="central" font-size="11">+ getUserById(id)</text>
  
  <!-- UserServiceImpl Class -->
  <rect x="40" y="400" width="160" height="120" rx="8" fill="var(--color-background-primary)" stroke="#534AB7" stroke-width="1.5"/>
  <rect x="40" y="400" width="160" height="30" rx="8 8 0 0" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="120" y="418" class="th" text-anchor="middle" dominant-baseline="central" font-size="13">UserServiceImpl</text>
  <line x1="40" y1="430" x2="200" y2="430" stroke="#534AB7" stroke-width="1.5"/>
  <text x="50" y="448" class="t" dominant-baseline="central" font-size="11">- userMapper: UserMapper</text>
  <line x1="40" y1="462" x2="200" y2="462" stroke="#534AB7" stroke-width="1"/>
  <text x="50" y="480" class="t" dominant-baseline="central" font-size="11">+ login(username)</text>
  <text x="50" y="496" class="t" dominant-baseline="central" font-size="11">+ register(user)</text>
  <text x="50" y="512" class="t" dominant-baseline="central" font-size="11">+ getUserById(id)</text>
  
  <!-- UserController Class -->
  <rect x="260" y="400" width="160" height="120" rx="8" fill="var(--color-background-primary)" stroke="#0F6E56" stroke-width="1.5"/>
  <rect x="260" y="400" width="160" height="30" rx="8 8 0 0" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="340" y="418" class="th" text-anchor="middle" dominant-baseline="central" font-size="13">UserController</text>
  <line x1="260" y1="430" x2="420" y2="430" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="270" y="448" class="t" dominant-baseline="central" font-size="11">- userService</text>
  <line x1="260" y1="462" x2="420" y2="462" stroke="#0F6E56" stroke-width="1"/>
  <text x="270" y="480" class="t" dominant-baseline="central" font-size="11">+ login(dto)</text>
  <text x="270" y="496" class="t" dominant-baseline="central" font-size="11">+ register(dto)</text>
  <text x="270" y="512" class="t" dominant-baseline="central" font-size="11">+ getUserInfo()</text>
  
  <!-- DetectionService Interface -->
  <rect x="480" y="250" width="160" height="100" rx="8" fill="var(--color-background-secondary)" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5,5"/>
  <rect x="480" y="250" width="160" height="30" rx="8 8 0 0" fill="#FCEBEB" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="560" y="268" class="th" text-anchor="middle" dominant-baseline="central" font-size="13">DetectionService</text>
  <line x1="480" y1="280" x2="640" y2="280" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="490" y="298" class="t" dominant-baseline="central" font-size="11">+ detect(image)</text>
  <text x="490" y="314" class="t" dominant-baseline="central" font-size="11">+ getResult(id)</text>
  <text x="490" y="330" class="t" dominant-baseline="central" font-size="11">+ getHistory(userId)</text>
  
  <!-- Relationships -->
  <!-- User to CtImage -->
  <path d="M 120 190 L 120 210 L 340 210 L 340 230" stroke="#378ADD" stroke-width="1" fill="none"/>
  <text x="180" y="200" class="ts" font-size="10">1</text>
  <text x="380" y="220" class="ts" font-size="10">n</text>
  
  <!-- User to DetectionRecord -->
  <path d="M 200 130 L 220 130 L 220 150 L 480 150" stroke="#378ADD" stroke-width="1" fill="none"/>
  <text x="240" y="140" class="ts" font-size="10">1</text>
  <text x="460" y="140" class="ts" font-size="10">n</text>
  
  <!-- UserService to UserServiceImpl -->
  <path d="M 120 350 L 120 400" stroke="#534AB7" stroke-width="1.5" marker-end="url(#inherit)" fill="none"/>
  <text x="125" y="370" class="ts" font-size="10">implements</text>
  
  <!-- UserController to UserService -->
  <path d="M 220 460 L 240 460 L 240 300 L 200 300" stroke="#0F6E56" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  
  <!-- UserServiceImpl to User -->
  <path d="M 80 400 L 80 380 L 100 380 L 100 190" stroke="#534AB7" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="60" y="280" class="ts" font-size="10">uses</text>
  
</svg>