<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 500" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font: 11px sans-serif; fill: var(--color-text-primary, #444441); }
      .ts { font: 10px sans-serif; fill: var(--color-text-secondary, #888780); }
      .th { font: 500 13px sans-serif; fill: var(--color-text-primary, #444441); }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="340" y="30" class="th" text-anchor="middle">CT图像松材线虫病检测系统 - 用例图</text>
  
  <!-- System Boundary -->
  <rect x="180" y="70" width="320" height="400" rx="12" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="340" y="95" class="t" text-anchor="middle" font-size="13" fill="#378ADD">CT图像松材线虫病检测系统</text>
  
  <!-- Actors -->
  <!-- 游客 -->
  <g>
    <circle cx="80" cy="120" r="15" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="135" x2="80" y2="170" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="60" y1="145" x2="100" y2="145" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="170" x2="65" y2="195" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="170" x2="95" y2="195" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <text x="80" y="215" class="t" text-anchor="middle" font-size="11">游客</text>
  </g>
  
  <!-- 注册用户 -->
  <g>
    <circle cx="80" cy="280" r="15" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="295" x2="80" y2="330" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="60" y1="305" x2="100" y2="305" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="330" x2="65" y2="355" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="330" x2="95" y2="355" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <text x="80" y="375" class="t" text-anchor="middle" font-size="11">注册用户</text>
  </g>
  
  <!-- 管理员 -->
  <g>
    <circle cx="80" cy="430" r="15" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="445" x2="80" y2="480" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="60" y1="455" x2="100" y2="455" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="480" x2="65" y2="505" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <line x1="80" y1="480" x2="95" y2="505" stroke="var(--color-border-secondary)" stroke-width="1"/>
    <text x="80" y="520" class="t" text-anchor="middle" font-size="11">管理员</text>
  </g>
  
  <!-- Use Cases -->
  <!-- 游客用例 -->
  <ellipse cx="340" cy="120" rx="70" ry="30" fill="var(--color-background-primary)" stroke="#639922" stroke-width="1"/>
  <text x="340" y="125" class="t" text-anchor="middle" font-size="11">浏览首页</text>
  
  <ellipse cx="340" cy="190" rx="70" ry="30" fill="var(--color-background-primary)" stroke="#639922" stroke-width="1"/>
  <text x="340" y="195" class="t" text-anchor="middle" font-size="11">查看介绍</text>
  
  <!-- 注册用户用例 -->
  <ellipse cx="340" cy="260" rx="70" ry="30" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="1"/>
  <text x="340" y="265" class="t" text-anchor="middle" font-size="11">上传CT图像</text>
  
  <ellipse cx="340" cy="330" rx="85" ry="30" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="1"/>
  <text x="340" y="335" class="t" text-anchor="middle" font-size="11">进行病害检测</text>
  
  <ellipse cx="340" cy="400" rx="85" ry="30" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="1"/>
  <text x="340" y="405" class="t" text-anchor="middle" font-size="11">查看检测报告</text>
  
  <ellipse cx="500" cy="260" rx="85" ry="30" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="1"/>
  <text x="500" y="265" class="t" text-anchor="middle" font-size="11">注册登录</text>
  
  <ellipse cx="500" cy="330" rx="85" ry="30" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="1"/>
  <text x="500" y="335" class="t" text-anchor="middle" font-size="11">管理个人信息</text>
  
  <!-- 管理员用例 -->
  <ellipse cx="500" cy="400" rx="85" ry="30" fill="var(--color-background-primary)" stroke="#993C1D" stroke-width="1"/>
  <text x="500" y="405" class="t" text-anchor="middle" font-size="11">管理用户数据</text>
  
  <ellipse cx="500" cy="460" rx="85" ry="30" fill="var(--color-background-primary)" stroke="#993C1D" stroke-width="1"/>
  <text x="500" y="465" class="t" text-anchor="middle" font-size="11">管理检测模型</text>
  
  <!-- Include Relationships -->
  <path d="M 340 150 L 340 160" stroke="#378ADD" stroke-width="1" fill="none"/>
  <text x="320" y="155" class="ts" font-size="9">«include»</text>
  
  <!-- Actor to Use Case Connections -->
  <!-- 游客连接 -->
  <path d="M 95 120 L 270 120" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <path d="M 95 120 L 270 190" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <!-- 注册用户连接 -->
  <path d="M 95 280 L 255 260" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <path d="M 95 280 L 255 330" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <path d="M 95 280 L 255 400" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <path d="M 95 280 L 415 260" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <path d="M 95 280 L 415 330" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <!-- 管理员连接 -->
  <path d="M 95 430 L 415 400" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
  <path d="M 95 430 L 415 460" stroke="var(--color-text-primary)" stroke-width="1" fill="none"/>
  
</svg>