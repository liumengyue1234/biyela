<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 500" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font: 12px sans-serif; fill: var(--color-text-primary, #444441); }
      .ts { font: 10px sans-serif; fill: var(--color-text-secondary, #888780); }
      .th { font: 500 13px sans-serif; fill: var(--color-text-primary, #444441); }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="340" y="30" class="th" text-anchor="middle">用户登录时序图</text>
  
  <!-- Participants -->
  <rect x="40" y="60" width="120" height="40" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <text x="100" y="80" class="t" text-anchor="middle" dominant-baseline="central" font-size="12">用户</text>
  
  <rect x="200" y="60" width="120" height="40" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <text x="260" y="80" class="t" text-anchor="middle" dominant-baseline="central" font-size="12">前端</text>
  
  <rect x="360" y="60" width="120" height="40" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <text x="420" y="80" class="t" text-anchor="middle" dominant-baseline="central" font-size="12">Controller</text>
  
  <rect x="520" y="60" width="120" height="40" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <text x="580" y="80" class="t" text-anchor="middle" dominant-baseline="central" font-size="12">Service</text>
  
  <!-- Lifelines -->
  <line x1="100" y1="100" x2="100" y2="460" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="260" y1="100" x2="260" y2="460" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="420" y1="100" x2="420" y2="460" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="580" y1="100" x2="580" y2="460" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="5,5"/>
  
  <!-- Messages -->
  <!-- 1. 输入用户名密码 -->
  <line x1="100" y1="130" x2="260" y2="130" stroke="var(--color-text-primary)" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text x="180" y="122" class="ts" text-anchor="middle" font-size="10">1. 输入用户名密码</text>
  
  <!-- 2. 发送登录请求 -->
  <line x1="260" y1="170" x2="420" y2="170" stroke="var(--color-text-primary)" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text x="340" y="162" class="ts" text-anchor="middle" font-size="10">2. POST /api/user/login</text>
  
  <!-- 3. 调用登录服务 -->
  <line x1="420" y1="210" x2="580" y2="210" stroke="var(--color-text-primary)" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text x="500" y="202" class="ts" text-anchor="middle" font-size="10">3. login(username, password)</text>
  
  <!-- 4. 查询数据库 -->
  <rect x="560" y="240" width="80" height="30" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
  <text x="600" y="255" class="t" text-anchor="middle" dominant-baseline="central" font-size="10">数据库查询</text>
  
  <!-- 5. 返回用户信息 -->
  <line x1="580" y1="290" x2="420" y2="290" stroke="var(--color-text-primary)" stroke-width="1" marker-end="url(#arrow)" fill="none" stroke-dasharray="5,5"/>
  <text x="500" y="282" class="ts" text-anchor="middle" font-size="10">5. 返回User对象</text>
  
  <!-- 6. 生成JWT Token -->
  <rect x="400" y="320" width="100" height="30" rx="4" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="450" y="335" class="t" text-anchor="middle" dominant-baseline="central" font-size="10">生成JWT Token</text>
  
  <!-- 7. 返回Token -->
  <line x1="420" y1="370" x2="260" y2="370" stroke="var(--color-text-primary)" stroke-width="1" marker-end="url(#arrow)" fill="none" stroke-dasharray="5,5"/>
  <text x="340" y="362" class="ts" text-anchor="middle" font-size="10">7. 返回Token</text>
  
  <!-- 8. 存储Token，跳转页面 -->
  <line x1="260" y1="410" x2="100" y2="410" stroke="var(--color-text-primary)" stroke-width="1" marker-end="url(#arrow)" fill="none" stroke-dasharray="5,5"/>
  <text x="180" y="402" class="ts" text-anchor="middle" font-size="10">8. 存储Token，跳转首页</text>
  
  <!-- Activation boxes -->
  <rect x="415" y="170" width="10" height="160" fill="var(--color-background-tertiary)" opacity="0.3"/>
  <rect x="575" y="210" width="10" height="80" fill="var(--color-background-tertiary)" opacity="0.3"/>
  
</svg>